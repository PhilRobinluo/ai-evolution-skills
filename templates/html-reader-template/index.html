<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bilingual Reader</title>
  <style>
    :root {
      --paper: #ffffff;
      --ink: #161616;
      --muted: #595959;
      --rule: #e9e4dc;
      --accent: #d97756;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", "Songti SC", "STSong", serif;
    }

    @page {
      size: Letter portrait;
      margin: 0;
    }

    .page {
      width: 8.5in;
      min-height: 11in;
      margin: 0 auto;
      padding: 0.72in 0.78in 0.62in;
      break-after: page;
    }

    .pill {
      display: inline-block;
      border: 1px solid var(--ink);
      border-radius: 999px;
      padding: 5px 14px 6px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
    }

    h1 {
      margin: 0.26in 0 0.28in;
      font-size: 38px;
      line-height: 1.02;
      font-weight: 400;
      letter-spacing: -0.04em;
    }

    .pair {
      padding-bottom: 15px;
      margin-bottom: 15px;
      border-bottom: 1px solid var(--rule);
      break-inside: avoid;
    }

    .en {
      font-size: 15.2px;
      line-height: 1.48;
      margin-bottom: 8px;
    }

    .zh {
      font-family: "Songti SC", "STSong", "PingFang SC", serif;
      font-size: 14.2px;
      line-height: 1.68;
      color: #2b2b2b;
    }

    .colophon {
      border-top: 1px solid var(--rule);
      padding-top: 0.22in;
      color: #3a3a3a;
      font-family: Arial, "PingFang SC", sans-serif;
      font-size: 13px;
      line-height: 1.75;
    }

    @media screen and (max-width: 900px) {
      html, body {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }

      .page {
        width: 100vw;
        max-width: 100vw;
        min-height: auto;
        padding: 28px 22px 34px;
        break-after: auto;
      }

      h1 {
        max-width: min(calc(100vw - 44px), 386px);
        font-size: 34px;
        overflow-wrap: anywhere;
      }

      .en {
        max-width: 100%;
        font-size: 17px;
        line-height: 1.52;
        overflow-wrap: anywhere;
      }

      .zh {
        max-width: 100%;
        font-size: 16px;
        line-height: 1.72;
        overflow-wrap: break-word;
      }
    }
  </style>
</head>
<body>
  <section class="page">
    <div class="pill">Bilingual Reader</div>
    <h1>Example Title</h1>

    <article class="pair">
      <div class="en">English source paragraph goes here.</div>
      <div class="zh">中文翻译放在这里。</div>
    </article>

    <article class="pair">
      <div class="en">Another source paragraph goes here.</div>
      <div class="zh">另一段中文翻译放在这里。</div>
    </article>
  </section>

  <section class="page">
    <div class="colophon">
      This bilingual study edition was prepared for learning, reading, and discussion.
    </div>
  </section>
</body>
</html>
